service:
  name: rembg-service
  type: serverless
  runtime: docker

env:
  - name: PORT
    value: "8080"
  - name: WORKERS
    value: "1"
  - name: ORT_ENABLE_MEM_PATTERN
    value: "0"
  - name: OMP_NUM_THREADS
    value: "1"
  - name: MKL_NUM_THREADS
    value: "1"
  - name: ONNXRUNTIME_LOGGER_SEVERITY
    value: "3"
  - name: ORT_LOGGING_LEVEL
    value: "3"

health_check:
  path: /health
  interval: 30
