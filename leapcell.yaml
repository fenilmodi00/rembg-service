version: "1.0"
services:
  - name: rembg-service
    type: http
    # RUNTIME: Using Docker build is RECOMMENDED to ensure system libs & CPU patches
    # To use this, change Build Strategy in Leapcell Dashboard to 'Docker'
    image_runtime: python:3.12-slim-bookworm
    # COMMAND: Run with 1 worker to fit in memory
    start_command: uvicorn app.main:app --host 0.0.0.0 --port 7000 --workers 1
    port: 7000
    # HEALTH CHECK: Leapcell calls this first
    health_check_path: /kaithhealth
    # ENVIRONMENT: Optimized for memory and CPU
    env:
      - name: TORCH_NUM_THREADS
        value: "1"
      - name: MKL_NUM_THREADS
        value: "1"
      - name: OMP_NUM_THREADS
        value: "1"
      - name: HF_HUB_OFFLINE
        value: "1" # Force use of build-time cache
      - name: PYTHONUNBUFFERED
        value: "1"
