# Updated leapcell.yaml for optimal deployment
service:
  name: rembg-service
  type: serverless
  runtime: docker
  # Note: On many PaaS, you don't run 'docker build' as a command. 
  # You just provide the Dockerfile.
  build_command: pip install -r requirements.txt
  start_command: uvicorn app.main:app --host 0.0.0.0 --port 8080

env:
  - name: PORT
    value: "8080"
  - name: WORKERS
    value: "1"

health_check:
  path: /kaithhealth
  interval: 30
