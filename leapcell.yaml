service:
  name: rembg-service
  type: serverless
  runtime: python
  build_command: pip install -r requirements.txt && python -c "from transformers import AutoModelForImageSegmentation; AutoModelForImageSegmentation.from_pretrained('ZhengPeng7/BiRefNet', trust_remote_code=True)"
  start_command: uvicorn app.main:app --host 0.0.0.0 --port 7000 --workers 1

env:
  - name: PORT
    value: "7000"
  - name: WORKERS
    value: "1"
  - name: TORCH_NUM_THREADS
    value: "1"
  - name: MKL_NUM_THREADS
    value: "1"

health_check:
  path: /kaithhealthcheck
  interval: 30
