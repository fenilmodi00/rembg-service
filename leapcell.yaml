service:
  name: rembg-service
  type: serverless
  runtime: python
  build_command: pip install -r requirements.txt && python -c "from rembg import new_session; new_session('u2net')"
  start_command: uvicorn app.main:app --host 0.0.0.0 --port 7000 --workers 1

env:
  - name: PORT
    value: "7000"
  - name: WORKERS
    value: "1"
  - name: ORT_ENABLE_MEM_PATTERN
    value: "0"
  - name: OMP_NUM_THREADS
    value: "1"
  - name: MKL_NUM_THREADS
    value: "1"
  - name: ONNXRUNTIME_LOGGER_SEVERITY
    value: "3"
  - name: ORT_LOGGING_LEVEL
    value: "3"

health_check:
  path: /kaithhealthcheck
  interval: 30
