# Updated leapcell.yaml for optimal deployment
service:
  name: rembg-service
  type: serverless
  runtime: docker
  # Note: On many PaaS, you don't run 'docker build' as a command. 
  # You just provide the Dockerfile.

env:
  - name: PORT
    value: "8080"
  - name: WORKERS
    value: "1"
  - name: OMP_NUM_THREADS
    value: "1"
  - name: MKL_NUM_THREADS
    value: "1"
  - name: ONNXRUNTIME_LOGGER_SEVERITY
    value: "3"
  - name: ORT_LOGGING_LEVEL
    value: "3"

health_check:
  path: /kaithhealth
  interval: 30
